<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Veck Combat Arena</title><style>body{margin:0;overflow:hidden;background:#87CEEB;font-family:Arial,sans-serif;user-select:none;transition:background-color .05s ease-out}

.hud-text{color:#fff;font-weight:bold;font-size:14px;margin-top:5px;text-shadow:1px 1px 2px #000}
.yellow-text{color:#ffd600}
#buff-notifier{color:#00e5ff;font-weight:bold;font-size:16px;margin-top:5px;text-shadow:1px 1px 2px #000;display:none}
#behind-warning{position:absolute;bottom:150px;left:50%;transform:translateX(-50%);background:rgba(255,23,68,.85);color:#fff;padding:10px 24px;font-size:18px;font-weight:bold;border-radius:6px;box-shadow:0 0 15px #ff1744;display:none;pointer-events:none;z-index:10;animation:flash .5s infinite alternate}
@keyframes flash{from{opacity:.4}to{opacity:1}}
#hud-top{position:absolute;top:20px;left:50%;transform:translateX(-50%);display:flex;gap:15px;z-index:10;font-weight:bold;pointer-events:none}
.hud-box{background:rgba(0,0,0,.6);color:#fff;padding:10px 20px;font-size:24px;border-radius:5px;text-align:center;min-width:60px}
.yellow-box{background:#ffd600;color:#000}
#ammo-display{position:absolute;bottom:40px;right:35%;color:#fff;font-weight:bold;text-shadow:2px 2px 4px rgba(0,0,0,.8);z-index:10;pointer-events:none;text-align:right}
#ammo-count{font-size:42px}#weapon-name{font-size:20px;display:block}
#menu-container{position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.98);display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:99999;pointer-events:auto}
.weapon-select-box{display:flex;gap:20px;margin-top:25px;pointer-events:auto}
.btn{padding:20px 35px;border:none;font-size:18px;font-weight:bold;cursor:pointer;border-radius:6px;box-shadow:0 6px 15px rgba(0,0,0,.2);transition:transform .1s,background-color .2s;pointer-events:auto}
.btn:hover{transform:scale(1.05)}#paintball-btn{background:#ffd600;color:#111}#paintball-btn:hover{background:#e6c000}#ar-btn{background:#222;color:#fff}#ar-btn:hover{background:#444}</style>
